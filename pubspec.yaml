name: sistem_monitoring_kandang
description: "Sistem Monitoring Kandang - Audit Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  shimmer: ^3.0.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend - Supabase & Laravel API
  supabase_flutter: ^2.9.0
  dio: ^5.8.0+1

  # Local Database
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Camera & Image
  camera: ^0.11.1
  image: ^4.5.3

  # Location & Maps
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # AI / ML
  tflite_flutter: ^0.11.0

  # PDF & Reports
  pdf: ^3.11.2
  printing: ^5.13.5

  # QR Code
  qr_flutter: ^4.1.0

  # Signature
  hand_signature: ^3.0.2

  # Background Sync
  workmanager: ^0.9.0+3
  connectivity_plus: ^6.1.4

  # Storage & Security
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  crypto: ^3.0.6

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  share_plus: ^10.1.4
  ntp: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/models/
    - assets/images/
